services:
  unbound-node:
    build: .
    container_name: dns-resolver
    # privileged разрешает Docker-у автоматически настроить cgroups для контейнера
    privileged: true
    tty: true # docker logs
    # tmpfs нужен systemd для хранения сокетов и PID файлов в памяти
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - ./unbound.conf:/etc/unbound/unbound.conf:ro
      - ./scripts/:/scripts/
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", ".", "NS", "+short"]
      interval: 90s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      dns-lab:
        ipv4_address: 10.10.0.2

  # Redis server
  cache:
    image: redis:7.4-alpine
    container_name: dns-cache
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "\"$$REDIS_PASSWORD\"", "ping", "|", "grep", "-q", "PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      dns-lab:
        ipv4_address: 10.10.0.3

  # Redis WebUI
  redis-webui:
    image: redis/redisinsight:2.70
    container_name: redis-webui
    volumes:
      - redisinight-data:/data
    ports:
      - "127.0.0.1:5540:5540"
    networks:
      dns-lab:
        ipv4_address: 10.10.0.4
    depends_on:
      - cache
    profiles:
      - debug

  dns-proxy:
    build: ./proxy
    container_name: dns-proxy
    depends_on:
      - cache
      - unbound-node
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      dns-lab:
        ipv4_address: 10.10.0.5
    ports:
      - "5300:53/udp"

networks:
  dns-lab:
    name: dns-lab
    ipam:
      config:
        - subnet: 10.10.0.0/24

volumes:
  redis-data:
  redisinight-data:
