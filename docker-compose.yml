services:
  unbound-node:
    build: .
    container_name: dns-resolver
    # privileged разрешает Docker-у автоматически настроить cgroups для контейнера
    privileged: true
    tty: true # docker logs
    # tmpfs нужен systemd для хранения сокетов и PID файлов в памяти
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - ./unbound.conf:/etc/unbound/unbound.conf:ro
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", ".", "NS", "+short"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      dns-lab:
        ipv4_address: 10.10.0.2

networks:
  dns-lab:
    name: dns-lab
    ipam:
      config:
        - subnet: 10.10.0.0/24
