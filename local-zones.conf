server:

    # ── ЗАДАЧА 1.3.Б: redirect + domain-insecure ─────────────────

    # Тип redirect: ВСЕ запросы к isc.org и *.isc.org
    # получают ответ из local-data записи для зоны
    local-zone: "isc.org." redirect

    # Подменные A-записи (фиктивные IP для демонстрации подмены)
    local-data: "isc.org. 3600 IN A 192.0.2.0"

    # SOA запись (необходима для корректности зоны)
    local-data: "isc.org. 3600 IN SOA ns1.isc.org. support.isc.org. 2024011501 3600 900 604800 300"

    # NS записи
    local-data: "isc.org. 3600 IN NS ns1.isc.org."
    local-data: "isc.org. 3600 IN NS ns2.isc.org."

    # MX запись (чтобы не получать NXDOMAIN на почтовые запросы)
    local-data: "isc.org. 3600 IN MX 10 mail.isc.org."

    # AAAA (IPv6) — указываем loopback чтобы не было NXDOMAIN
    local-data: "isc.org. 3600 IN AAAA ::1"

    # Директива отключения DNSSEC-валидации для этой зоны
    # (необходима для задачи 1.3.Б)
    domain-insecure: "isc.org."